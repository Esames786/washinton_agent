<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="60" height="60">
  <defs>
    <linearGradient id="o4g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="45%" stop-color="#E8B830"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="o4dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <!-- Outer thick gold ring -->
  <circle cx="110" cy="110" r="106" fill="url(#o4g)"/>
  <!-- Black inner -->
  <circle cx="110" cy="110" r="96" fill="url(#o4dark)"/>
  <!-- Thin inner ring -->
  <circle cx="110" cy="110" r="86" fill="none" stroke="url(#o4g)" stroke-width="1.5"/>

  <!-- HELLO TRANSPORT curved top — inside ring -->
  <path id="c4top" d="M 32,110 A 78,78 0 0,1 188,110" fill="none"/>
  <text font-family="Arial Black,sans-serif" font-size="17" font-weight="900" fill="url(#o4g)" letter-spacing="4">
    <textPath href="#c4top" startOffset="3%">HELLO TRANSPORT</textPath>
  </text>

  <!-- Shield outline -->
  <path d="M110 52 L148 72 L148 112 Q148 140 110 158 Q72 140 72 112 L72 72 Z"
        fill="none" stroke="url(#o4g)" stroke-width="2.5"/>
  <!-- Shield fill subtle -->
  <path d="M110 58 L143 76 L143 112 Q143 137 110 153 Q77 137 77 112 L77 76 Z"
        fill="url(#o4g)" opacity="0.07"/>

  <!-- Truck inside shield -->
  <rect x="80" y="100" width="42" height="22" rx="2" fill="url(#o4g)"/>
  <rect x="122" y="105" width="18" height="17" rx="2" fill="url(#o4g)"/>
  <rect x="124" y="108" width="9" height="8" rx="1" fill="#080808" opacity="0.8"/>
  <rect x="120" y="95" width="3" height="11" rx="1" fill="url(#o4g)"/>
  <circle cx="92" cy="125" r="7" fill="#080808" stroke="url(#o4g)" stroke-width="2.2"/>
  <circle cx="92" cy="125" r="3" fill="url(#o4g)"/>
  <circle cx="112" cy="125" r="7" fill="#080808" stroke="url(#o4g)" stroke-width="2.2"/>
  <circle cx="112" cy="125" r="3" fill="url(#o4g)"/>
  <circle cx="130" cy="125" r="7" fill="#080808" stroke="url(#o4g)" stroke-width="2.2"/>
  <circle cx="130" cy="125" r="3" fill="url(#o4g)"/>

  <!-- Dot separators -->
  <circle cx="78" cy="168" r="2.5" fill="url(#o4g)" opacity="0.7"/>
  <circle cx="110" cy="172" r="2.5" fill="url(#o4g)" opacity="0.7"/>
  <circle cx="142" cy="168" r="2.5" fill="url(#o4g)" opacity="0.7"/>

  <!-- Bottom tagline curved -->
  <path id="c4bot" d="M 38,110 A 72,72 0 0,0 182,110" fill="none"/>
  <text font-family="Arial,sans-serif" font-size="7.5" fill="#C9A84C" letter-spacing="2" opacity="0.85">
    <textPath href="#c4bot" startOffset="8%">TRUSTED AUTO TRANSPORT CO.</textPath>
  </text>
</svg>
